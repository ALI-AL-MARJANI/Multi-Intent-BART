experiment_name: "gemis-mixatis"

model:
  backbone: "facebook/bart-large"
  mlp_hidden: 512

data:
  train_path: "data/raw/mixatis/train.txt"
  dev_path:   "data/raw/mixatis/dev.txt"
  test_path:  "data/raw/mixatis/test.txt"
  max_source_length: 128
  max_target_length: 128

training:
  learning_rate: 0.00002
  batch_size: 16
  max_epochs: 30
  warmup_steps: 200
  gradient_clip: 1.0
  device: "cuda"
  seed: 42

output:
  checkpoint_dir: "checkpoints/mixatis"
  log_level: "INFO"
